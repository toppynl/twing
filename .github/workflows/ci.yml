name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-root:
    name: Test @toppynl/twing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: npm run build:lib

      - name: Build test suite
        run: npm run build:test

      - name: Run tests
        run: npm test

  test-workspaces:
    name: Test ${{ matrix.package.filter }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - filter: '@toppynl/twing-html-extra'
            path: packages/html-extra
          - filter: '@toppynl/twing-components'
            path: packages/components
          - filter: '@toppynl/twing-cache-extra'
            path: packages/cache
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build root (workspace dependency)
        run: npm run build:lib

      - name: Build and test ${{ matrix.package.filter }}
        run: |
          pnpm --filter="${{ matrix.package.filter }}" run build:test
          pnpm --filter="${{ matrix.package.filter }}" run test
