name: Release Workspace Packages

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-workspaces:
    name: Release workspace packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build root (workspace dependency)
        run: npm run build:lib

      - name: Release @toppynl/twing-html-extra
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TOPPYNL_ORG }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN_TOPPYNL_ORG }}
        run: npx semantic-release --extends ./.releaserc/html-extra.json

      - name: Release @toppynl/twing-components
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TOPPYNL_ORG }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN_TOPPYNL_ORG }}
        run: npx semantic-release --extends ./.releaserc/components.json

      - name: Release @toppynl/twing-cache-extra
        if: hashFiles('packages/cache/package.json') != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_TOPPYNL_ORG }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN_TOPPYNL_ORG }}
        run: npx semantic-release --extends ./.releaserc/cache.json
